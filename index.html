<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gh-card</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a10;
  color: #e8e8f0;
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.5rem 4rem;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #7c6af7, #2dd4bf);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: .25rem;
}
.sub {
  font-size: .75rem;
  color: #5a5a70;
  margin-bottom: 2.5rem;
  letter-spacing: .06em;
}

.panel {
  background: #111118;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
  padding: 1.5rem;
  width: 100%;
  max-width: 560px;
  margin-bottom: 1.2rem;
}

/* controls row */
.controls {
  display: flex;
  gap: .5rem;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}
input, select {
  background: #18181f;
  border: 1px solid rgba(255,255,255,.1);
  color: #e8e8f0;
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  padding: .45rem .85rem;
  border-radius: 7px;
  outline: none;
  transition: border-color .2s;
}
input { flex: 1; min-width: 140px; }
input:focus, select:focus { border-color: #7c6af7; }

.btn {
  background: #7c6af7;
  color: #fff;
  border: none;
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  padding: .45rem 1rem;
  border-radius: 7px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:hover  { opacity: .85; }
.btn:active { transform: scale(.97); }

/* force-refresh button — distinct style */
.btn-refresh {
  background: transparent;
  border: 1px solid rgba(255,255,255,.12);
  color: #7c6af7;
  font-family: 'DM Mono', monospace;
  font-size: .8rem;
  padding: .45rem 1rem;
  border-radius: 7px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  white-space: nowrap;
}
.btn-refresh:hover { border-color: #7c6af7; background: rgba(124,106,247,.08); }

/* card preview area */
.preview-wrap {
  position: relative;
  background: #0d0d14;
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 195px;
}
.preview-wrap img {
  display: block;
  width: 100%;
  max-width: 495px;
  height: auto;
}
.preview-wrap .loading-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,16,.7);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.preview-wrap.loading .loading-overlay { opacity: 1; }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid rgba(255,255,255,.1);
  border-top-color: #7c6af7;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* slide counter */
.slide-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: .75rem;
  font-size: .68rem;
  color: #5a5a70;
}
.slide-dots { display: flex; gap: 4px; }
.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  transition: background .3s;
}
.dot.active { background: #7c6af7; }

/* snippet */
.snippet-label {
  font-size: .62rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #5a5a70;
  margin: 1.2rem 0 .5rem;
}
.snippet {
  position: relative;
  background: #09090f;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 8px;
  padding: .8rem 2.8rem .8rem 1rem;
  font-size: .72rem;
  color: #a99cf9;
  line-height: 1.7;
  overflow-x: auto;
  white-space: nowrap;
}
.copy-btn {
  position: absolute;
  top: 50%; right: .6rem;
  transform: translateY(-50%);
  background: #1a1a27;
  color: #6b6b80;
  border: 1px solid rgba(255,255,255,.08);
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  padding: .2rem .55rem;
  border-radius: 5px;
  cursor: pointer;
  transition: color .15s;
}
.copy-btn:hover { color: #e8e8f0; }
.copy-btn.copied { color: #4ade80; border-color: #4ade80; }

.params {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
  margin-top: .8rem;
}
.param-chip {
  background: #18181f;
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 5px;
  padding: .25rem .65rem;
  font-size: .65rem;
  color: #6b6b80;
}
.param-chip strong { color: #e8e8f0; }
</style>
</head>
<body>

<h1>gh-card</h1>
<div class="sub">one rotating info block · refreshes every 10 min · embed in readme</div>

<div class="panel">

  <!-- controls -->
  <div class="controls">
    <input  id="uname" type="text" placeholder="github username" value="torvalds"/>
    <select id="theme">
      <option value="dark">dark</option>
      <option value="light">light</option>
    </select>
    <button class="btn"         onclick="load()">preview</button>
    <button class="btn-refresh" onclick="forceNext()" title="skip to next slide">↻ next slide</button>
  </div>

  <!-- preview -->
  <div class="preview-wrap" id="preview-wrap">
    <img id="img" src="" alt="gh-card preview"/>
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>

  <!-- slide indicator -->
  <div class="slide-info">
    <span id="slide-label">—</span>
    <div class="slide-dots" id="dots"></div>
    <span id="slide-num">—</span>
  </div>

  <!-- snippets -->
  <div class="snippet-label">embed in readme</div>
  <div class="snippet">
    <button class="copy-btn" id="copy-md" onclick="copy('md')">copy</button>
    <span id="snip-md"></span>
  </div>

  <div class="snippet-label">html (for sizing control)</div>
  <div class="snippet">
    <button class="copy-btn" id="copy-html" onclick="copy('html')">copy</button>
    <span id="snip-html"></span>
  </div>

  <div class="params">
    <div class="param-chip"><strong>?user=</strong>username — required</div>
    <div class="param-chip"><strong>&theme=</strong>dark|light</div>
    <div class="param-chip"><strong>&slide=</strong>0-11 — pin a slide</div>
  </div>

</div>

<script>
const TOTAL_SLIDES = 12;
const SLIDE_NAMES = [
  'PROFILE','REPOS','STARS','FOLLOWERS','FOLLOWING',
  'LANG BAR','TOP REPOS','ACTIVITY','COMMITS','EVENTS',
  'SPOTLIGHT','LANG LIST',
];

// offset simulates bucket skipping for the preview only
let slideOffset = 0;

function currentBucket() {
  return Math.floor(Date.now() / (10*60*1000));
}
function currentSlideIdx() {
  return (currentBucket() + slideOffset) % TOTAL_SLIDES;
}

function buildUrl(bust) {
  const u = document.getElementById('uname').value.trim();
  const t = document.getElementById('theme').value;
  if (!u) return null;
  let url = `/api/card?user=${encodeURIComponent(u)}&theme=${t}`;
  // bust cache by passing a bucket param so Vercel sees a new URL
  if (bust !== undefined) url += `&_b=${bust}`;
  return url;
}

function updateDots(idx) {
  const cont = document.getElementById('dots');
  cont.innerHTML = '';
  for (let i=0; i<TOTAL_SLIDES; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i===idx?' active':'');
    cont.appendChild(d);
  }
  document.getElementById('slide-label').textContent = SLIDE_NAMES[idx];
  document.getElementById('slide-num').textContent   = (idx+1)+' / '+TOTAL_SLIDES;
}

function updateSnippets() {
  const u = document.getElementById('uname').value.trim() || 'username';
  const t = document.getElementById('theme').value;
  const base = location.origin;
  const url = `${base}/api/card?user=${u}${t!=='dark'?'&theme='+t:''}`;
  document.getElementById('snip-md').textContent   = `![GitHub Stats](${url})`;
  document.getElementById('snip-html').textContent = `<img src="${url}" width="495" alt="GitHub Stats"/>`;
}

function load() {
  slideOffset = 0;
  doLoad((currentBucket() + slideOffset) % TOTAL_SLIDES, false);
}

function forceNext() {
  slideOffset = (slideOffset + 1) % TOTAL_SLIDES;
  // use bucket+offset as cache buster so server picks different slot
  doLoad((currentBucket() + slideOffset) % TOTAL_SLIDES, true);
}

function doLoad(idx, bust) {
  const wrap = document.getElementById('preview-wrap');
  const img  = document.getElementById('img');
  wrap.classList.add('loading');

  // For the preview we pass _b= to force a different bucket on the server
  const u = document.getElementById('uname').value.trim();
  const t = document.getElementById('theme').value;
  if (!u) { wrap.classList.remove('loading'); return; }

  // We simulate slide selection client-side for the preview by appending _slide=
  // (server reads it to override bucket % SLIDES)
  const url = `/api/card?user=${encodeURIComponent(u)}&theme=${t}&_slide=${idx}&_t=${Date.now()}`;

  img.onload  = () => { wrap.classList.remove('loading'); };
  img.onerror = () => { wrap.classList.remove('loading'); };
  img.src = url;

  updateDots(idx);
  updateSnippets();
}

function copy(which) {
  const text = which==='md'
    ? document.getElementById('snip-md').textContent
    : document.getElementById('snip-html').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-'+which);
    btn.textContent='copied!'; btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='copy'; btn.classList.remove('copied'); }, 1800);
  });
}

// init
document.getElementById('uname').addEventListener('keydown', e => { if(e.key==='Enter') load(); });
document.getElementById('theme').addEventListener('change', load);
load();
</script>
</body>
</html>
